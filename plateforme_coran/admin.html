<body class="p-4 md:p-8">



<div class="flex justify-center mb-4 mt-2">
    <img src="logo.webp" alt="مواهب المنان" class="h-24 object-contain drop-shadow-md">
</div>
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- رأس الصفحة -->
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-emerald-900">لوحة تحكم الإدارة</h1>
                <p class="text-sm text-gray-500 font-bold mt-1">متابعة حسابات وإنجازات الطلاب</p>
            </div>
<a href="login.html" onclick="Auth.logout()" class="px-4 py-2 bg-rose-50 text-rose-600 font-bold rounded-xl hover:bg-rose-100 transition"> الخروج </a>        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- قسم إضافة طالب جديد -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">إنشاء حساب طالب</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">الاسم الشخصي</label>
                        <input id="new-prenom" type="text" class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none" >
                    </div>
                    <div>
                         <label class="block text-sm font-bold text-gray-600 mb-1">الاسم العائلي</label>

                        <input id="new-nom" type="text" class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none" >
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">كلمة المرور</label>
                        <input id="new-pass" type="password" class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none" placeholder="4 أحرف/أرقام على الأقل">
                    </div>
                    <button onclick="createStudent()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition">
                        إضافة الطالب ✔️
                    </button>
                    <div id="admin-msg" class="text-center text-sm font-bold mt-2 hidden"></div>
                </div>
            </div>

            <!-- جدول متابعة الطلاب -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2 overflow-hidden">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex justify-between items-center">
                    <span>قائمة الطلاب والتقدم</span>
                    <span id="total-students" class="text-sm bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full"></span>
                </h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-right text-sm">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th class="p-3 rounded-r-xl">اسم الطالب</th>
                                <th class="p-3">اسم المستخدم (للدخول)</th>
                                <th class="p-3">السور المنجزة</th>
                                <th class="p-3 text-center rounded-l-xl">إجراءات</th>

                        </thead>
                        <tbody id="students-table-body" class="divide-y divide-gray-100">

            </div>
        </div>
    </div>
  
<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mt-8">
    <h2 class="text-xl font-black text-gray-800 mb-4"> إدارة الأساتذة </h2>
    
    <div class="flex gap-2 mb-6 p-4 bg-gray-50 rounded-xl">
        <input type="text" id="new-prof-prenom"   placeholder="اسم" class="px-3 py-2 rounded border flex-1">
        <input type="text" id="new-prof-classe"   placeholder="القسم" class="px-3 py-2 rounded border flex-1">
        <input type="text" id="new-prof-pass"   placeholder="كلمة المرور" class="px-3 py-2 rounded border flex-1">
        <button onclick="creerProf()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">+ إضافة </button>
    </div>

    <div class="flex items-center gap-4 mb-6 bg-emerald-50 p-4 rounded-xl border border-emerald-100">
        <span class="font-bold text-emerald-800">ربط تلميذ بأستاذ  :</span>
        <select id="select-student" class="p-2 border rounded rounded-lg flex-1"></select>
        <span class="text-gray-400">➡️</span>
        <select id="select-prof" class="p-2 border rounded rounded-lg flex-1"></select>
        <button onclick="assignerEleve()" class="bg-emerald-600 text-white px-4 py-2 rounded font-bold hover:bg-emerald-700">ربط </button>
    </div>

    <div id="liste-profs-container" class="space-y-4">
        </div>
</div>

 <script>

    const ADMIN_PASSWORD = 'admin1234';

const password = prompt("الرجاء إدخال رمز الإدارة");

if (password !== ADMIN_PASSWORD) {
    alert("رمز غير صحيح");
    document.body.innerHTML = "";
    window.location.replace("login.html");
}

    // Protection de la page admin
    if (localStorage.getItem('adminAuth') !== 'true') {
        const pwd = prompt("الرجاء إدخال كلمة مرور الإدارة:");
        if (pwd === "admin1234") {
            localStorage.setItem('adminAuth', 'true');
        } else {
            alert("كلمة المرور خاطئة!");
            window.location.href = "login.html";
        }
    }

    function renderStudents() {
        const students = Auth.getAllStudents();
        const tbody = document.getElementById('students-table-body');
        document.getElementById('total-students').innerText = `${students.length} طلاب`;
        tbody.innerHTML = '';

        students.forEach(student => {
        // ── حساب السور المنجزة وبناء الشارات الخضراء ──────────────────────────────
const progressKeys = Object.keys(student.progress || {});
const completedSurahs = progressKeys.filter(id => student.progress[id] && student.progress[id].completedAt);

let surahsHtml = '';
if (completedSurahs.length === 0) {
    surahsHtml = '<span class="text-gray-400 text-xs">لم ينجز أي سورة بعد</span>';
} else {
    surahsHtml = completedSurahs.map(id => {
        const surahName = SURAH_REGISTRY.find(s => s.id === id)?.nameAr || id;
        const score = student.progress[id].globalScore ?? 100;
        return `<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded shadow-sm m-1 inline-block border border-green-200 font-bold">✅ ${surahName} (${score}%)</span>`;
    }).join('');
}

            // ── شارة الإيقاف ────────────────────────────────────
            const suspendedBadge = student.isSuspended
                ? `<span class="inline-block bg-red-100 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded-full mr-1">🚫 موقوف</span>`
                : `<span class="inline-block bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-full mr-1">✅ نشط</span>`;

            // ── رسائل الطالب (للحذف من جانب الأدمن) ────────────
            const msgs = Auth.getMessages(student.username);
            let msgsHtml = '';
            if (msgs.length > 0) {
                msgsHtml = msgs.map((m, idx) => `
                    <div class="flex items-center justify-between bg-blue-50 border border-blue-100 rounded-lg px-2 py-1 mt-1 text-xs">
                        <span class="text-blue-800 font-semibold">${m.text} <span class="text-blue-400">(${m.date})</span></span>
                        <button onclick="deleteMessage('${student.username}', ${idx})"
                                class="mr-2 text-rose-500 hover:text-rose-700 font-bold text-sm leading-none">✕</button>
                    </div>`).join('');
            }

            // ── صف الجدول ───────────────────────────────────────
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition align-top";
            tr.innerHTML = `
                <td class="p-3">
                    <span class="font-bold text-gray-800">${student.prenom} ${student.nom}</span>
                    <div class="mt-1">${suspendedBadge}</div>
                </td>
                <td class="p-3">
                    <span class="font-mono text-gray-500 text-xs bg-gray-100 rounded px-2 py-1">${student.username}</span>
                </td>
                <td class="p-3">
                    ${surahsHtml}
                </td>
                <td class="p-3">
                    <div class="flex flex-wrap gap-1.5 justify-center">
                        <button onclick="openProfileModal('${student.username}', '${student.prenom} ${student.nom}')" 
        class="bg-purple-100 text-purple-700 px-3 py-1 rounded hover:bg-purple-200 transition font-bold text-xs">📂 الملف الإداري </button>
                        <button onclick="editSchedule('${student.username}')"
                                class="bg-blue-100 text-blue-600 px-3 py-1 rounded hover:bg-blue-200 transition font-bold text-xs">📅 الجداول</button>
                        <button onclick="removeStudent('${student.username}')"
                                class="bg-rose-100 text-rose-600 px-3 py-1 rounded hover:bg-rose-200 transition font-bold text-xs">🗑️ حذف</button>
                        <button onclick="sendMsg('${student.username}')"
                                class="bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200 transition font-bold text-xs">✉️ رسالة</button>
                        <button onclick="toggleUserSuspension('${student.username}')"
                                class="px-3 py-1 text-xs font-bold rounded transition-colors ${student.isSuspended ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-amber-100 text-amber-700 hover:bg-amber-200'}">
                            ${student.isSuspended ? '🔄 تفعيل' : '🚫 إيقاف'}
                        </button>
                    </div>
                    ${msgsHtml}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function createStudent() {
        const prenom = document.getElementById('new-prenom').value;
        const nom    = document.getElementById('new-nom').value;
        const pass   = document.getElementById('new-pass').value;
        const msgBox = document.getElementById('admin-msg');
        
        // تمرير 'true' هنا يمنع النظام من تسجيل الخروج للمشرف
        const res    = Auth.register(prenom, nom, pass, true);
        
        msgBox.classList.remove('hidden');
        if (res.ok) {
            msgBox.innerText  = "تم إنشاء الحساب بنجاح!";
            msgBox.className  = "text-center text-sm font-bold mt-2 text-emerald-600 bg-emerald-50 p-2 rounded";
            // تفريغ الخانات بعد النجاح
            document.getElementById('new-prenom').value = '';
            document.getElementById('new-nom').value    = '';
            document.getElementById('new-pass').value   = '';
            renderStudents();
        } else {
            msgBox.innerText = res.error;
            msgBox.className = "text-center text-sm font-bold mt-2 text-rose-600 bg-rose-50 p-2 rounded";
        }
        setTimeout(() => msgBox.classList.add('hidden'), 3000);
    }

    function removeStudent(username) {
        if (confirm('هل أنت متأكد من حذف هذا الطالب نهائياً؟')) {
            Auth.deleteStudent(username);
            renderStudents();
        }
    }

    function editSchedule(username) {
        const current     = Auth.getSchedule(username);
        const placeholder = current === "لم يتم تحديد أوقات الحصص بعد." ? "" : current;
        const newSched    = prompt("أدخل أيام وأوقات الحصص:\n(مثال: الإثنين 17:00 والخميس 18:00)", placeholder);
        if (newSched !== null && newSched.trim() !== "") {
            Auth.setSchedule(username, newSched.trim());
            alert("تم حفظ الجدول بنجاح!");
            renderStudents();
        }
    }

    function toggleUserSuspension(username) {
        if (confirm('هل أنت متأكد من تغيير حالة هذا الحساب؟')) {
            Auth.toggleSuspension(username);
            renderStudents();
        }
    }

    function sendMsg(username) {
        const msg = prompt("اكتب رسالتك لهذا الطالب:");
        if (msg !== null && msg.trim() !== "") {
            Auth.sendMessage(username, msg.trim());
            alert("تم إرسال الرسالة بنجاح!");
            renderStudents();
        }
    }

    // ── حذف رسالة واحدة بعينها (من جانب الأدمن) ──────────────
    function deleteMessage(username, index) {
        if (confirm('هل تريد حذف هذه الرسالة؟')) {
            Auth.deleteMessageByIndex(username, index);
            renderStudents();
        }
    }
    function openProfileModal(username, fullName) {
        document.getElementById('modal-username').value = username;
        document.getElementById('modal-student-name').innerText = fullName;
        
        const profile = Auth.getProfile(username);
        document.getElementById('modal-cin').checked = profile.cinProvided;
        document.getElementById('modal-birthcert').checked = profile.birthCertProvided;
        
        const tbody = document.getElementById('modal-payments-body');
        tbody.innerHTML = '';
        profile.payments.forEach(p => addPaymentRow(p.month, p.status));
        
        document.getElementById('profile-modal').classList.remove('hidden');
    }

    function closeProfileModal() {
        document.getElementById('profile-modal').classList.add('hidden');
    }

function chargerGestionProfs() {
    const profs = Auth.getProfs();
    const users = Auth.getAllUsers();
    
    // Remplir les menus déroulants pour l'assignation
    const selectStudent = document.getElementById('select-student');
    const selectProf = document.getElementById('select-prof');
    
    selectStudent.innerHTML = Object.entries(users).map(([u, d]) => `<option value="${u}">${d.prenom} ${d.nom}</option>`).join('');
    selectProf.innerHTML = Object.entries(profs).map(([u, d]) => `<option value="${u}">${d.prenom} (${d.classe})</option>`).join('');

    // Afficher la liste des professeurs et leurs élèves assignés
    const container = document.getElementById('liste-profs-container');
    container.innerHTML = Object.entries(profs).map(([username, data]) => `
        <div class="border border-gray-200 p-4 rounded-xl bg-white shadow-sm flex justify-between items-start">
            <div>
                <h3 class="font-black text-lg text-blue-900">${data.prenom} <span class="text-sm font-normal text-gray-500 bg-gray-100 px-2 rounded">قسم: ${data.classe}</span></h3>
                <p class="text-sm text-gray-600 mt-2"><strong>تلاميذ :</strong></p>
                <div class="flex flex-wrap gap-2 mt-1">
                    ${data.students.length === 0 ? '<span class="text-xs text-gray-400">لا يوجد تلميذ</span>' : ''}
                    ${data.students.map(eleveId => {
                        const nomComplet = users[eleveId] ? users[eleveId].prenom + ' ' + users[eleveId].nom : eleveId;
                        return `<span class="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded font-bold flex items-center gap-1">
                                    ${nomComplet} 
                                    <button onclick="retirerEleve('${username}', '${eleveId}')" class="text-red-500 hover:text-red-700 ml-1">x</button>
                                </span>`;
                    }).join('')}
                </div>
            </div>
            <button onclick="supprimerProf('${username}')" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded transition text-sm font-bold">🗑️ حذف</button>
        </div>
    `).join('');
}

function creerProf() {
        const p = document.getElementById('new-prof-prenom').value;
        const c = document.getElementById('new-prof-classe').value;
        const m = document.getElementById('new-prof-pass').value;
        if(!p || !c || !m) return alert("المرجو ملء جميع الخانات");
        
        const res = Auth.registerProf(p, c, m);
        if(res.ok) {
            // تفريغ الخانات وتحديث الواجهة بعد الإضافة
            document.getElementById('new-prof-prenom').value = '';
            document.getElementById('new-prof-classe').value = '';
            document.getElementById('new-prof-pass').value = '';
            chargerGestionProfs();
            alert("تم إضافة الأستاذ بنجاح");
        } else {
            alert(res.error);
        }
    }
function supprimerProf(username) {
    if(confirm("هل أنت متأكد من حذف هذا الأستاذ؟")) {
        const profs = Auth.getProfs();
        delete profs[username];
        Auth.saveProfs(profs);
        chargerGestionProfs();
    }
}

function assignerEleve() {
    const studentId = document.getElementById('select-student').value;
    const profId = document.getElementById('select-prof').value;
    
    // Vérification que les listes ne sont pas vides
    if(!studentId || !profId) {
        alert("المرجو اختيار التلميذ والأستاذ أولاً"); 
        return;
    }

    const profs = Auth.getProfs();
    
    // SÉCURITÉ CRITIQUE : Si le professeur n'a pas encore de tableau 'students', on le crée
    if(!profs[profId].students) {
        profs[profId].students = [];
    }

    // Assignation et messages d'alerte
    if(!profs[profId].students.includes(studentId)) {
        profs[profId].students.push(studentId);
        Auth.saveProfs(profs);
        chargerGestionProfs(); // Rafraîchit l'interface
        alert("✅ تم ربط التلميذ بالأستاذ بنجاح !"); 
    } else {
        alert("⚠️ هذا التلميذ مرتبط بالفعل بهذا الأستاذ.");
    }
}

function retirerEleve(profId, studentId) {
    const profs = Auth.getProfs();
    profs[profId].students = profs[profId].students.filter(id => id !== studentId);
    Auth.saveProfs(profs);
    chargerGestionProfs();
}

// N'oublie pas d'appeler chargerGestionProfs() quand la page admin charge (ex: dans window.onload).

    function addPaymentRow(month = '', status = 'en attente') {
        const tbody = document.getElementById('modal-payments-body');
        const tr = document.createElement('tr');
        tr.className = "payment-row border-b border-gray-100";
        tr.innerHTML = `
            <td class="py-2 pr-1">
                <input type="text" class="month-input w-full p-1 border rounded text-sm bg-white"  value="${month}">
            </td>
            <td class="py-2 px-1">
                <select class="status-input w-full p-1 border rounded text-sm bg-white font-bold ${status === 'payé' ? 'text-emerald-600' : 'text-amber-600'}">
                    <option value="en attente" ${status === 'en attente' ? 'selected' : ''}>⏳</option>
                    <option value="payé" ${status === 'payé' ? 'selected' : ''}>✅</option>
                </select>
            </td>
            <td class="py-2 text-center">
                <button onclick="this.closest('tr').remove()" class="text-rose-500 font-bold hover:text-rose-700">✕</button>
            </td>
        `;
// Changer la couleur du select selon le choix
tr.querySelector('.status-input').addEventListener('change', function() {
    this.className = `status-input w-full p-1 border rounded text-sm bg-white font-bold ${
        this.value === 'payé'
            ? 'text-emerald-600'
            : 'text-amber-600'
    }`;
});

tbody.appendChild(tr);
}

function saveAdminProfile() {
    const username = document.getElementById('modal-username').value;
    const cinProvided = document.getElementById('modal-cin').checked;
    const birthCertProvided = document.getElementById('modal-birthcert').checked;

    const payments = [];

    document.querySelectorAll('.payment-row').forEach(row => {
        const month = row.querySelector('.month-input').value.trim();
        const status = row.querySelector('.status-input').value;

        if (month) {
            payments.push({ month, status });
        }
    });

    Auth.updateProfile(username, {
        cinProvided,
        birthCertProvided,
        payments
    });

    alert("تم حفظ الملف الإداري بنجاح! (Profil mis à jour)");
    closeProfileModal();
}

window.addEventListener('DOMContentLoaded', () => {
    renderStudents();
    chargerGestionProfs(); // هذا السطر هو الذي سيقوم بإظهار قائمة الأساتذة عند فتح الصفحة
});
</script>
    <!-- Fenêtre Modale du Profil Élève -->

        <input type="hidden" id="modal-username">

        <div class="space-y-4">

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-gray-700">الأداءات الشهرية </h3>
                    <button onclick="addPaymentRow()" class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold hover:bg-blue-200">+ إضافة شهر</button>

                <table class="w-full text-sm text-right">
                    <thead class="text-gray-500 border-b">

                            <th class="pb-1 w-1/2">الشهر </th>

                            <th class="pb-1 text-center">حذف</th>

                    </thead>
                    <tbody id="modal-payments-body">
                        <!-- Les lignes seront injectées ici -->
                    </tbody>
                </table>
            </div>

            <button onclick="saveAdminProfile()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition mt-4">
                حفظ التغييرات ✔️
            </button>
        </div>
