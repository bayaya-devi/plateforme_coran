<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة جمعية مواهب المنان - دار القرآن والحديث - لوحة الطالب</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="auth.js"></script>
    <script src="registry.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f5f0; }
        .quran-font { font-family: 'Amiri', serif; }
        .surah-card { transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: pointer; }
        .surah-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px -6px rgba(0,0,0,0.15); }
        .surah-card-locked { opacity: 0.55; cursor: not-allowed; filter: grayscale(0.3); }
        .header-bg { background: linear-gradient(135deg, #1a3c34 0%, #0c4a3b 40%, #14532d 100%); }
    </style>
</head>
<body>
<div class="flex justify-center mb-4 mt-2">
    <img src="logo.webp" alt="مواهب المنان" class="h-24 object-contain drop-shadow-md">
</div>

    <script>Auth.requireAuth('login.html');</script>

    <header class="header-bg text-white py-6 px-4 shadow-xl">
       <div id="messages-container" class="max-w-5xl mx-auto mb-6 hidden"></div>
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl overflow-hidden border border-white/20 shadow-inner bg-white/10 flex items-center justify-center">
                    <span class="text-3xl">📖</span>
                </div>
                <div>
                    <h1 class="text-xl md:text-3xl font-black leading-tight">مرحباً بك، <span id="student-name" class="text-emerald-300"></span> ! </h1>
                    <p class="text-emerald-100 font-semibold mt-1 text-sm">اختر السورة التي تود دراستها ومراجعتها اليوم</p>
                </div>
            </div>
            <button onclick="Auth.logout(); window.location.href='login.html'" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white font-bold rounded-xl border border-white/20 transition text-sm">
الخروج            </button>
        </div>
    </header>
  
<a href="profil.html" class="flex items-center gap-2 px-5 py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-sm rounded-xl border border-blue-200 transition">
    <span> ملفي الشخصي </span>
</a>
<!-- Zone des devoirs (Générée par JS) -->
<div id="zone-devoirs" class="mb-8 space-y-3">
    <!-- Les devoirs s'afficheront ici -->
</div>
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6 flex items-center justify-between max-w-4xl mx-auto mt-6">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-2xl shadow-inner">
                📅
            </div>
            <div>
                <h2 class="text-sm text-gray-500 font-bold mb-1"> توقيت الحصص </h2>
                <p id="student-schedule" class="text-lg text-blue-900 font-extrabold quran-font"></p>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-center gap-4">
            <div class="flex-grow">
                <div class="flex justify-between text-sm mb-2 font-bold text-gray-700">
                    <span>تقدمك العام</span>
                    <span id="student-progress-label">0 / 0 سورة</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-3 shadow-inner overflow-hidden">
                    <div id="student-progress-fill" class="bg-emerald-500 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
            <div class="text-3xl">🏆</div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <h2 class="text-lg font-black text-gray-700 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-emerald-500 rounded-full inline-block"></span>
            السور المتاحة للتعلم
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10" id="available-grid"></div>

        <h2 class="text-lg font-black text-gray-700 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-gray-300 rounded-full inline-block"></span>
            السور القادمة قريباً
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="locked-grid"></div>
    </main>

    <script>
        function toArabicNum(n) { return String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }
        // Ajoute ceci dans la fonction d'initialisation de ta page (ex: window.onload)
function chargerDevoirs() {
    const sessionStr = localStorage.getItem('quran_session');
    if (!sessionStr) return;
    const session = JSON.parse(sessionStr);
    
    const users = Auth.getAllUsers(); 
    const myData = users[session.username];
    
    const zoneDevoirs = document.getElementById('zone-devoirs');
    zoneDevoirs.innerHTML = '';

    // 1. استخراج الواجبات المعلقة بأمان
    let devoirsEnAttente = [];
    if (myData && myData.devoirs) {
        devoirsEnAttente = myData.devoirs.filter(d => d.statut === 'en_attente');
    }

    // 2. التحقق من وجود واجبات
    if (devoirsEnAttente.length > 0) {
        let html = '<h2 class="text-xl font-black text-rose-600 mb-3">🚨 واجبات جديدة </h2>';
        
        devoirsEnAttente.forEach(devoir => {
            // Formater la date
            const limite = new Date(devoir.dateLimite).toLocaleDateString('fr-FR');
            
            html += `
                <div class="bg-rose-50 border border-rose-200 p-4 rounded-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-3">
                    <div>
                        <p class="text-sm text-rose-800 font-bold mb-1"> من الأستاذ(ة): ${devoir.profName}</p>
                        <h3 class="text-lg font-black text-gray-800">
                            سورة ${devoir.surate} : من الآية ${devoir.ayaDebut} إلى الآية ${devoir.ayaFin}
                        </h3>
                        <p class="text-sm text-gray-600 mt-1">⏳ آخر أجل  : <span class="font-bold text-rose-600">${limite}</span></p>
                    </div>

                </div>
            `;
        });
        zoneDevoirs.innerHTML = html;
    } else {
        // 3. رسالة عدم وجود واجبات
        zoneDevoirs.innerHTML = `
            <div class="text-center p-6 bg-white rounded-xl border border-gray-200 shadow-sm mb-4">
                <div class="text-4xl mb-3 opacity-50">📚</div>
                <p class="text-gray-600 text-lg font-bold" dir="rtl">لا يوجد أي واجب حالياً.</p>
                <p class="text-gray-400 text-sm mt-1 font-semibold"></p>
            </div>
        `;
    }
}

// Fonction appelée quand l'élève clique sur "Je l'ai appris"
function validerDevoir(devoirId) {
    if(confirm("هل أنت متأكد أنك حفظت هذا الواجب؟ ")) {
        const session = JSON.parse(localStorage.getItem('quran_session'));
        Auth.marquerDevoirTermine(session.username, devoirId);
        chargerDevoirs(); // Rafraîchir l'affichage
        alert("ممتاز! بارك الله فيك ");
    }
}

// N'oublie pas d'appeler chargerDevoirs() quand la page s'ouvre !
chargerDevoirs();
        function buildStudentDashboard() {
            const session = Auth.getSession();
            if (!session) return;
            
            // Chargement des messages
            const userMessages = Auth.getMessages(session.username);
            const msgContainer = document.getElementById('messages-container');

            if (userMessages && userMessages.length > 0) {
                msgContainer.classList.remove('hidden');
                
                // Génère le HTML pour chaque message
                msgContainer.innerHTML = userMessages.map(m => `
                    <div class="bg-blue-50 border-r-4 border-blue-500 p-4 rounded-xl mb-3 shadow-sm flex justify-between items-center animate-pulse">
                        <div>
                            <h4 class="font-bold text-blue-800 text-sm">رسالة من الإدارة 📢 :</h4>
                            <p class="text-blue-900 mt-1 text-lg font-semibold">${m.text}</p>
                            <span class="text-xs text-blue-400 mt-2 block">${m.date}</span>
                        </div>
                        <button onclick="Auth.clearMessages('${session.username}'); window.location.reload();" class="bg-white text-blue-500 hover:bg-blue-100 px-3 py-1 rounded-lg text-sm font-bold transition shadow-sm border border-blue-200">
                            قراءة وإخفاء ✓
                        </button>
                    </div>
                `).join('');
            }

            // Afficher l'horaire de l'élève
            document.getElementById('student-schedule').innerText = Auth.getSchedule(session.username);
            document.getElementById('student-name').innerText = session.prenom;
            
            const progressData = Auth.getProgress(session.username);
            const available = SURAH_REGISTRY.filter(s => s.available);
            const locked = SURAH_REGISTRY.filter(s => !s.available);
            
            // حساب السور المنجزة
            let completedCount = 0;
            available.forEach(s => {
                if(progressData[s.id] && progressData[s.id].completedAt) completedCount++;
            });

            // تحديث شريط التقدم
            if(available.length > 0) {
                const pct = Math.round((completedCount / available.length) * 100);
                document.getElementById('student-progress-fill').style.width = pct + '%';
                document.getElementById('student-progress-label').textContent = `${completedCount} / ${available.length} سورة`;
            }

            // بناء السور المتاحة
            const availGrid = document.getElementById('available-grid');
            available.forEach((s, i) => {
                const isCompleted = progressData[s.id] && progressData[s.id].completedAt;
                const score = isCompleted ? progressData[s.id].globalScore : null;

                const card = document.createElement('a');
                card.href = s.file;
                card.className = `surah-card ${isCompleted ? 'bg-emerald-50/50' : 'bg-white'} rounded-2xl shadow-sm border ${isCompleted ? 'border-emerald-200' : 'border-gray-100'} p-5 flex items-center gap-4 no-underline relative overflow-hidden`;
                card.style.borderRightColor = s.color;
                card.style.borderRightWidth = '4px';

                // Calcul du nombre d'activités réalisées pour cette sourate (Déplacé HORS du template literal)
                const surahProgress = progressData[s.id] || {};
                const activities = surahProgress.activities || {};
                const activityCount = Object.keys(activities).length;
                const activityBar = activityCount > 0
                    ? `<div class="mt-2 w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                         <div class="h-full rounded-full transition-all" style="width:${Math.min(activityCount * 14, 100)}%; background:${s.color}"></div>
                       </div>
                       <span class="text-[10px] text-gray-400 mt-0.5 block text-left">${activityCount} نشاط مكتمل</span>`
                    : '';

                card.innerHTML = `
                    ${isCompleted ? '<div class="absolute top-2 left-2 text-emerald-500 text-sm font-bold bg-emerald-100 px-2 py-0.5 rounded-lg flex items-center gap-1">✔️ </div>' : ''}
                    
                    <div class="w-14 h-14 rounded-xl flex flex-col items-center justify-center shrink-0 shadow-inner" style="background: ${s.color}18;">
                        <span class="text-base leading-none opacity-70">${s.emoji}</span>
                        <span class="quran-font font-bold mt-0.5" style="color:${s.color}">${toArabicNum(s.num)}</span>
                    </div>
                    
                    <div class="flex-grow text-right min-w-0">
                        <h3 class="quran-font text-xl font-bold text-gray-800 leading-tight">${s.nameAr}</h3>
                        <div class="flex flex-wrap gap-1.5 mt-2 justify-end">
            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${s.color}18; color:${s.color}">${s.ayat} آيات</span>
            <span class="text-[10px] font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${s.type}</span>
        </div>
        ${isCompleted 
            ? '<div class="mt-3 text-center bg-green-50 text-green-700 font-black text-sm py-1.5 px-2 rounded-lg border border-green-200 shadow-sm">✅ أتمم الحفظ بنجاح</div>' 
            : activityBar}
    </div>
`;
                availGrid.appendChild(card);
            });

            // بناء السور المقفلة
            const lockGrid = document.getElementById('locked-grid');
            locked.forEach(s => {
                const card = document.createElement('div');
                card.className = `surah-card-locked bg-white rounded-xl border border-dashed border-gray-200 p-3 flex flex-col items-center gap-1 text-center`;
                card.innerHTML = `
                    <span class="quran-font text-sm font-bold text-gray-500">${s.nameAr}</span>
                    <span class="text-[10px] text-gray-400">${s.ayat} آيات</span>
                    <span class="text-[10px] font-bold bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full mt-1">قريباً</span>
                `;
                lockGrid.appendChild(card);
            });
        }

        buildStudentDashboard();
    </script>
</body>
</html>
